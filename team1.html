<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Team1 - 이어 말하기</title>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
        font-family: 'Noto Sans KR', sans-serif;
    }
    .app {
        position: relative;
        width: 1280px;
        height: 720px;
        overflow: hidden;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.18);
    }
    .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
        padding: 40px 60px;
    }
    .slide.active {
        opacity: 1;
        visibility: visible;
    }
    .title-card {
        width: 100%;
        height: 100%;
        border-radius: 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 60px;
    }
    .title-card h1 {
        font-size: 72px;
        line-height: 1.05;
        margin-bottom: 20px;
        letter-spacing: 2px;
    }
    .title-card p {
        font-size: 24px;
        color: rgba(255,255,255,0.9);
    }
    .question-card {
        width: 100%;
        height: 100%;
        border-radius: 24px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        border: 1px solid #e2e8f0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 80px 60px;
    }
    .question-card h2 {
        font-size: 60px;
        color: #0f172a;
        margin-bottom: 24px;
    }
    .question-card .word {
        font-size: 52px;
        color: #1d4ed8;
        font-weight: 800;
        background: rgba(59, 130, 246, 0.12);
        padding: 24px 32px;
        border-radius: 24px;
        border: 1px solid rgba(59, 130, 246, 0.24);
        box-shadow: 0 16px 30px rgba(59, 130, 246, 0.12);
    }
    .nav-bar {
        position: absolute;
        bottom: 24px;
        right: 24px;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 10;
    }
    .nav-button {
        width: 54px;
        height: 54px;
        border: none;
        border-radius: 50%;
        background: rgba(15, 23, 42, 0.9);
        color: white;
        font-size: 20px;
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .nav-button:hover { transform: translateY(-2px); }
    .nav-button:disabled { opacity: 0.36; cursor: default; transform: none; }
    .page-indicator {
        color: #475569;
        font-size: 14px;
        font-weight: 700;
        background: rgba(255,255,255,0.88);
        padding: 10px 16px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }
</style>
</head>
<body>
<div class="app">
    <div class="slide active" data-index="0">
        <div class="title-card">
            <h1>Team1</h1>
            <p>이어 말하기 문제를 준비했습니다.</p>
        </div>
    </div>
    <div class="slide" data-index="1">
        <div class="question-card">
            <h2>문제 1</h2>
            <div class="word">딸기</div>
        </div>
    </div>
    <div class="slide" data-index="2">
        <div class="question-card">
            <h2>문제 2</h2>
            <div class="word">자전거</div>
        </div>
    </div>
    <div class="slide" data-index="3">
        <div class="question-card">
            <h2>문제 3</h2>
            <div class="word">정글</div>
        </div>
    </div>
    <div class="slide" data-index="4">
        <div class="question-card">
            <h2>문제 4</h2>
            <div class="word">변호사</div>
        </div>
    </div>
    <div class="slide" data-index="5">
        <div class="question-card">
            <h2>문제 5</h2>
            <div class="word">에티오피아</div>
        </div>
    </div>
    <div class="slide" data-index="6">
        <div class="question-card">
            <h2>문제 6</h2>
            <div class="word">흑백요리사</div>
        </div>
    </div>
    <div class="slide" data-index="7">
        <div class="question-card">
            <h2>문제 7</h2>
            <div class="word">컴퓨터</div>
        </div>
    </div>
    <div class="slide" data-index="8">
        <div class="question-card">
            <h2>문제 8</h2>
            <div class="word">위스키</div>
        </div>
    </div>
    <div class="slide" data-index="9">
        <div class="question-card">
            <h2>문제 9</h2>
            <div class="word">쥬스</div>
        </div>
    </div>
    <div class="slide" data-index="10">
        <div class="question-card">
            <h2>문제 10</h2>
            <div class="word">지킬앤하이드</div>
            <div style="margin-top: 40px;">
                <a href="./team2.html" class="nav-button" style="display: inline-flex; align-items: center; justify-content: center; text-decoration: none; color: white; font-size: 16px; padding: 12px 24px; border-radius: 25px; width: auto; height: auto;">팀2 문제 시작 <i class="fas fa-arrow-right" style="margin-left: 8px;"></i></a>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="page-indicator">1 / 11</div>
        <button class="nav-button" id="prevBtn" aria-label="이전 슬라이드"><i class="fas fa-chevron-left"></i></button>
        <button class="nav-button" id="nextBtn" aria-label="다음 슬라이드"><i class="fas fa-chevron-right"></i></button>
    </div>
</div>
<script>
    const slides = document.querySelectorAll('.slide');
    const pageIndicator = document.querySelector('.page-indicator');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    let currentIndex = 0;

    function updateSlides() {
        slides.forEach((slide, index) => {
            slide.classList.toggle('active', index === currentIndex);
        });
        pageIndicator.textContent = `${currentIndex + 1} / ${slides.length}`;
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === slides.length - 1;
    }

    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            currentIndex -= 1;
            updateSlides();
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentIndex < slides.length - 1) {
            currentIndex += 1;
            updateSlides();
        }
    });

    document.addEventListener('keydown', (event) => {
        if (event.key === 'ArrowLeft') prevBtn.click();
        if (event.key === 'ArrowRight') nextBtn.click();
    });
</script>
</body>
</html>
